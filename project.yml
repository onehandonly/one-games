name: OnePuzzle
options:
  bundleIdPrefix: com.onepuzzle
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: OnePuzzle/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  OnePuzzle:
    type: application
    platform: iOS
    sources:
      - path: OnePuzzle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onepuzzle.app
        INFOPLIST_FILE: OnePuzzle/Info.plist
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: OnePuzzle/Info.plist
    dependencies: []
    preBuildScripts:
      - name: "SwiftGen Strings"
        script: |
          if which swiftgen >/dev/null; then
            swiftgen run strings "$SRCROOT/OnePuzzle/Resources/Localizable.xcstrings" --output "$SRCROOT/OnePuzzle/Generated/Strings.swift"
          else
            echo "warning: SwiftGen not installed. Run 'brew install swiftgen' for auto-generated string constants."
          fi
        basedOnDependencyAnalysis: false

  OnePuzzleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OnePuzzleTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onepuzzle.tests
        TEST_TARGET_NAME: OnePuzzle
    dependencies:
      - target: OnePuzzle

  OnePuzzleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OnePuzzleUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onepuzzle.uitests
        TEST_TARGET_NAME: OnePuzzle
    dependencies:
      - target: OnePuzzle
